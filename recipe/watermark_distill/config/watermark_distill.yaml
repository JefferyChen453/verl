# Watermark Distillation Trainer Config
# Extends the SFT trainer engine config with watermark-specific fields.

defaults:
  - model@model: hf_model
  - engine@engine: fsdp
  - optim@optim: fsdp
  - _self_

# ---- Data ----
data:
  train_batch_size: 32
  micro_batch_size_per_gpu: 4
  max_token_len_per_gpu: 40960
  use_dynamic_bsz: True
  train_files: null
  val_files: null
  train_max_samples: -1
  val_max_samples: -1
  messages_key: messages
  tools_key: tools
  enable_thinking_key: enable_thinking
  pad_mode: no_padding
  max_length: 8192
  truncation: error
  balance_dp_token: False
  custom_cls:
    path: null
    name: null
  use_shm: False
  apply_chat_template_kwargs: {}

# ---- Checkpoint ----
checkpoint:
  _target_: verl.trainer.config.CheckpointConfig
  save_contents: ["model", "optimizer", "extra"]
  load_contents: ${checkpoint.save_contents}

# ---- Reference Model ----
# The ref model can be a different scale from the actor (same tokenizer/family).
ref_model:
  path: null
  param_offload: true

# ---- Trainer ----
trainer:
  default_local_dir: checkpoints/${trainer.project_name}/${trainer.experiment_name}
  default_hdfs_dir: null
  project_name: watermark-sft_mo
  experiment_name: test
  total_epochs: 3
  total_training_steps: null
  logger: ['console', 'wandb']
  seed: 1
  save_freq: -1
  test_freq: -1
  max_ckpt_to_keep: null
  resume_mode: auto
  resume_from_path: null
  device: cuda
  nnodes: 1
  n_gpus_per_node: 8

# ---- Watermark Config ----
# Per-sample watermark_key (seed) and fraction come from data columns "seed"
# and "fraction". Only training-time hyperparams live here.
watermark:
  strength: 2.0
  only_english: true
  green_loss_weight: 1.0
  kl_loss_weight: 1.0
